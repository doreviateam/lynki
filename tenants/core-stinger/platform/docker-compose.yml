# Docker Compose - Services Partagés (Platform)
# Généré automatiquement depuis manifest Phase 1
# Tenant: core-stinger
# Environment: stinger

services:
  # DVIG - Service partagé (API + Worker Outbox)
  dvig:
    image: dorevia/dvig:0.1.8-trace-observability
    container_name: dvig-core-stinger
    restart: unless-stopped
    networks:
      - dorevia-network
    environment:
      # Auth
      - DVIG_AUTH_ENABLED=1
      - DVIG_TOKENS_FILE=/etc/dvig/tokens.yml
      - DVIG_TOKENS_RELOAD_INTERVAL=60
      - DVIG_TOKENS_RELOAD_ON_SIGHUP=1
      
      # API
      - DVIG_HOST=0.0.0.0
      - DVIG_PORT=8080
      
      # Docs (désactivés en production)
      - DVIG_DOCS_ENABLED=0
      - DVIG_OPENAPI_ENABLED=0
      
      # Health
      - DVIG_HEALTH_PROTECTED=0
      
      # Logs (format JSON pour production)
      - DVIG_LOG_FORMAT=json
      - DVIG_LOG_LEVEL=info
      
      # Vault (VAULT_HOST utilisé par l'outbox worker pour POST /api/v1/events)
      - VAULT_URL=http://vault-core-stinger:8080
      - VAULT_HOST=vault-core-stinger
      - VAULT_API_KEY=${VAULT_API_KEY:-}
      # Database (partagée avec Vault pour simplifier - SPEC DVIG → Vault Forwarding v1.1)
      - DATABASE_URL=postgresql://vault:${VAULT_DB_PASSWORD:-vault_password}@vault-db-core-stinger:5432/dorevia_vault
      # Token interne pour orchestration queue_job (SPEC Orchestration temps réel DVIG via queue_job Odoo v1.0)
      - DVIG_INTERNAL_TOKEN=0MutdWWm97SG7KAHCd3jqGL7aYZNptuqSJiGyEOIzSI
      # Scheduler automatique pour traitement outbox (complément de queue_job)
      # INTERVAL=10 pour réduire le délai si /internal/outbox/process depuis Odoo échoue (objectif ≤15s)
      - DVIG_SCHEDULER_ENABLED=1
      - DVIG_SCHEDULER_INTERVAL=10
      - DVIG_SCHEDULER_LIMIT=50
    volumes:
      # Tokens (read-only) - Source de vérité unique: tenants/core-stinger/secrets/dvig.tokens.yml
      - /opt/dorevia-plateform/tenants/core-stinger/secrets/dvig.tokens.yml:/etc/dvig/tokens.yml:ro
      # Logs (optionnel)
      - dvig_logs_core-stinger:/var/log/dvig
    # Démarrage de l'API FastAPI avec scheduler intégré
    # Le scheduler traite automatiquement l'outbox toutes les 30 secondes
    command: ["python", "-m", "dvig.api_fastapi"]
    healthcheck:
      test: ["CMD", "sh", "-lc", "wget -qO- http://127.0.0.1:8080/health >/dev/null || curl -f http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 40s

  # Vault - Store de preuves + agrégations (sales, purchases, payments-in/out, adjustments SPEC_DOREVIA_ADJUSTMENTS_v1.0)
  vault:
    image: dorevia/vault:vaulting-routes
    container_name: vault-core-stinger
    restart: unless-stopped
    networks:
      - dorevia-network
    environment:
      - DATABASE_URL=postgres://vault:${VAULT_DB_PASSWORD:-vault_password}@vault-db-core-stinger:5432/dorevia_vault
      - PORT=8080
      # Configuration JWS (Sprint 2)
      - JWS_ENABLED=true
      - JWS_REQUIRED=false
      - JWS_PRIVATE_KEY_PATH=/opt/dorevia-vault/keys/jwt-private.pem
      - JWS_PUBLIC_KEY_PATH=/opt/dorevia-vault/keys/jwt-public.pem
      # Authentification JWT (Sprint 5 Phase 5.2)
      - AUTH_ENABLED=true
      - AUTH_JWT_ENABLED=true
      - AUTH_JWT_PUBLIC_KEY_PATH=/opt/dorevia-vault/keys/jwt-public.pem
      # Indicateur Confiance Vaultage (DVIG → vault-health)
      - DVIG_URL=http://dvig-core-stinger:8080
      - DVIG_INTERNAL_TOKEN=0MutdWWm97SG7KAHCd3jqGL7aYZNptuqSJiGyEOIzSI
      # Indicateur Confiance Rapprochement Bancaire (Odoo → bank-reconciliation-health)
      - ODOO_BANK_RECONCILIATION_URL=http://odoo_stinger_sarl-la-platine:8069/dorevia/vault/linky_bank_reconciliation
    volumes:
      # Volumes persistants pour stockage Vault (Phase 6 - Ops Hardening)
      - vault_storage_core-stinger:/opt/dorevia-vault/storage
      - vault_ledger_core-stinger:/opt/dorevia-vault/ledger
      - vault_audit_core-stinger:/opt/dorevia-vault/audit
      # Clés JWT (read-only)
      - /opt/dorevia-plateform/tenants/core-stinger/secrets/keys:/opt/dorevia-vault/keys:ro
    depends_on:
      - vault-db
    healthcheck:
      test: ["CMD", "sh", "-lc", "wget -qO- http://127.0.0.1:8080/health >/dev/null || curl -f http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 40s

  # Vault Database - PostgreSQL
  vault-db:
    image: postgres:16
    container_name: vault-db-core-stinger
    restart: unless-stopped
    environment:
      - POSTGRES_USER=vault
      - POSTGRES_PASSWORD=${VAULT_DB_PASSWORD:-vault_password}
      - POSTGRES_DB=dorevia_vault
    volumes:
      - vault_db_data_core-stinger:/var/lib/postgresql/data
    networks:
      - dorevia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vault_db_data_core-stinger:
    name: vault_db_core-stinger_data
  vault_storage_core-stinger:
    name: vault_storage_core-stinger
  vault_ledger_core-stinger:
    name: vault_ledger_core-stinger
  vault_audit_core-stinger:
    name: vault_audit_core-stinger
  dvig_logs_core-stinger:
    name: dvig_logs_core-stinger

networks:
  dorevia-network:
    external: true
