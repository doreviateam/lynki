# Docker Compose - Services Partagés (Platform)
# Généré automatiquement depuis manifest Phase 1
# Tenant: core-stinger
# Environment: stinger

name: dorevia_core-stinger_platform

services:
  # DVIG - Service partagé
  dvig:
    image: dorevia/dvig:payroll-2026-03-13
    container_name: dvig-core-stinger
    restart: unless-stopped
    networks:
      - dorevia-network
    environment:
      # Base de données (outbox + tokens) — obligatoire pour /ingest et /internal/outbox/process
      - DATABASE_URL=postgresql://dvig_user:${DVIG_DB_PASSWORD:-dvig_password}@dvig-db:5432/dvig_db
      # Auth
      - DVIG_AUTH_ENABLED=1
      - DVIG_TOKENS_FILE=/etc/dvig/tokens.yml
      - DVIG_TOKENS_RELOAD_INTERVAL=60
      - DVIG_TOKENS_RELOAD_ON_SIGHUP=1
      
      # API
      - DVIG_HOST=0.0.0.0
      - DVIG_PORT=8080
      
      # Docs (désactivés en production)
      - DVIG_DOCS_ENABLED=0
      - DVIG_OPENAPI_ENABLED=0
      
      # Health
      - DVIG_HEALTH_PROTECTED=0
      
      # Logs (format JSON pour production)
      - DVIG_LOG_FORMAT=json
      - DVIG_LOG_LEVEL=info
      
      # Vault (VAULT_HOST/PORT = sans redéploiement si modifiés)
      - VAULT_HOST=vault-core-stinger
      - VAULT_PORT=8080
      - VAULT_URL=http://vault-core-stinger:8080
      - VAULT_API_KEY=${VAULT_API_KEY:-}
      # Token pour /internal/outbox/process (Odoo : dorevia.dvig.internal.token = même valeur)
      - DVIG_INTERNAL_TOKEN=${DVIG_INTERNAL_TOKEN:-dvig_internal_core-stinger_stinger}
    depends_on:
      dvig-db:
        condition: service_healthy
    volumes:
      # Tokens (read-only) - Source de vérité unique: tenants/core-stinger/secrets/dvig.tokens.yml
      - /opt/dorevia-plateform/tenants/core-stinger/secrets/dvig.tokens.yml:/etc/dvig/tokens.yml:ro
      # Logs (optionnel)
      - dvig_logs_core-stinger:/var/log/dvig
    healthcheck:
      test: ["CMD", "sh", "-lc", "wget -qO- http://127.0.0.1:8080/health >/dev/null || curl -f http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 40s

  # DVIG Database - PostgreSQL (outbox_events)
  dvig-db:
    image: postgres:16
    container_name: dvig-db-core-stinger
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dvig_user
      - POSTGRES_PASSWORD=${DVIG_DB_PASSWORD:-dvig_password}
      - POSTGRES_DB=dvig_db
    volumes:
      - dvig_db_data_core-stinger:/var/lib/postgresql/data
    networks:
      - dorevia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvig_user -d dvig_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vault - Service partagé (ZeDocs/web52 BFR complet)
  vault:
    image: dorevia/vault:sprint11-2026-03-20
    container_name: vault-core-stinger
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - dorevia-network
    environment:
      - DATABASE_URL=postgres://vault:${VAULT_DB_PASSWORD:-vault_password}@vault-db-core-stinger:5432/dorevia_vault
      - PORT=8080
      # ADR-001 (ZeDocs/web51) : gateway DLP/DIVA — requis pour /ui/dlp/* et /ui/diva/*
      - DLP_URL=${DLP_URL:-http://dlp:8020}
      - DIVA_URL=${DIVA_URL:-http://diva:8010}
      # Trésorerie laplatine2026 : proxy Odoo LAB pour solde comptable + taux rapprochement
      - ODOO_BANK_RECONCILIATION_URL_LAPLATINE2026=http://odoo_lab_laplatine2026:8069/dorevia/vault/linky_bank_reconciliation
      # Trésorerie / complétude paiements o19 : Odoo 19 lab (réseau Docker dorevia-network)
      - ODOO_BANK_RECONCILIATION_URL_O19=http://odoo_lab_o19:8069/dorevia/vault/linky_bank_reconciliation
      # ZeDocs/web52 : token interne POST /internal/stock-valuation-snapshot
      - STOCK_VALUATION_INTERNAL_TOKEN=${STOCK_VALUATION_INTERNAL_TOKEN:-recette_stock_2026}
      # Sprint 15 T86 : token interne POST /internal/jobs/facts-pack-purge
      - FACTS_PACK_PURGE_TOKEN=${FACTS_PACK_PURGE_TOKEN:-purge_fp_2026}
    volumes:
      # Volumes persistants pour stockage Vault (Phase 6 - Ops Hardening)
      - vault_storage_core-stinger:/opt/dorevia-vault/storage
      - vault_ledger_core-stinger:/opt/dorevia-vault/ledger
      - vault_audit_core-stinger:/opt/dorevia-vault/audit
    depends_on:
      - vault-db
    healthcheck:
      test: ["CMD", "sh", "-lc", "wget -qO- http://127.0.0.1:8080/health >/dev/null || curl -f http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 40s

  # Vault Database - PostgreSQL
  vault-db:
    image: postgres:16
    container_name: vault-db-core-stinger
    restart: unless-stopped
    environment:
      - POSTGRES_USER=vault
      - POSTGRES_PASSWORD=${VAULT_DB_PASSWORD:-vault_password}
      - POSTGRES_DB=dorevia_vault
    volumes:
      - vault_db_data_core-stinger:/var/lib/postgresql/data
    networks:
      - dorevia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vault_db_data_core-stinger:
    name: vault_db_core-stinger_data
  vault_storage_core-stinger:
    name: vault_storage_core-stinger
  vault_ledger_core-stinger:
    name: vault_ledger_core-stinger
  vault_audit_core-stinger:
    name: vault_audit_core-stinger
  dvig_db_data_core-stinger:
    name: dvig_db_core-stinger_data
  dvig_logs_core-stinger:
    name: dvig_logs_core-stinger

networks:
  dorevia-network:
    external: true
