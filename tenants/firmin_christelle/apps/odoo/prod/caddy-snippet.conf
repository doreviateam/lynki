# Caddy — Odoo 19 prod Firmin Christelle
# À inclure dans la Caddyfile du serveur.
# /longpolling → port 8072 (temps réel : Discuss, notifications)

firmin.christelle.doreviateam.com {
  handle /longpolling* {
    reverse_proxy odoo_prod_firmin_christelle:8072 {
      header_up X-Forwarded-Proto {scheme}
      header_up X-Forwarded-For {remote_host}
    }
  }
  handle {
    reverse_proxy odoo_prod_firmin_christelle:8069 {
      header_up X-Forwarded-Proto {scheme}
      header_up X-Forwarded-For {remote_host}
    }
  }
}
