# Docker Compose - n8n lab core
# Généré automatiquement depuis manifest Phase 1
# Source attendue: n8n.lab.core
# DB name: n8n_lab_core
# Compose project: dorevia_n8n_lab_core

services:
  db:
    image: postgres:16
    container_name: n8n_db_lab_core
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
    volumes:
      - n8n_lab_core_db:/var/lib/postgresql/data
    networks:
      - dorevia-network
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=n8n psql -U n8n -d n8n -h localhost -c 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_lab_core
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      N8N_HOST: n8n.lab.core.doreviateam.com
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me-in-production-32-chars-minimum}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n_db_lab_core
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n
      TZ: Europe/Paris
      N8N_DEFAULT_LOCALE: ${N8N_DEFAULT_LOCALE:-fr}
    volumes:
      - n8n_lab_core_data:/home/node/.n8n
    networks:
      - dorevia-network
    # Port 5678 en interne (routage via Caddy)

volumes:
  n8n_lab_core_db:
    name: n8n_lab_core_db
  n8n_lab_core_data:
    name: n8n_lab_core_data

networks:
  dorevia-network:
    external: true
