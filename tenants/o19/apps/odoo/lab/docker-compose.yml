# Docker Compose - odoo lab o19
# Généré automatiquement depuis manifest Phase 1
# Source attendue: odoo.lab.o19
# DB name: odoo_lab_o19
# Compose project: dorevia_odoo_lab_o19

name: dorevia_odoo_lab_o19

services:
  db:
    image: postgres:16
    container_name: odoo_db_lab_o19
    restart: unless-stopped
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo_lab_o19_db:/var/lib/postgresql/data
    networks:
      - dorevia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:19.0-20260324
    container_name: odoo_lab_o19
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # DVIG / Vault — rapprochement bancaire (RECONCIL) et vaulting
      # Si ODOO_DVIG_TOKEN est vide, configurer dorevia.dvig.token dans Odoo (Paramètres techniques).
      ODOO_DVIG_URL: ${ODOO_DVIG_URL:-http://dvig-core-stinger:8080}
      ODOO_DVIG_SOURCE: odoo.lab.o19
      ODOO_DVIG_TENANT: o19
      ODOO_DVIG_TOKEN: ${DVIG_TOKEN_O19:-}
    networks:
      - dorevia-network
    volumes:
      # Sources OCA (read-only)
      - /opt/dorevia-plateform/sources/oca:/mnt/oca:ro
      # Addons Odoo 19 (queue_job 19.0 — avant extra-addons pour priorité)
      - /opt/dorevia-plateform/units/odoo/addons-o19:/mnt/addons-o19:ro
      # Extra-addons flatten (symlinks)
      - oca_extra_addons:/mnt/extra-addons
      # Addons métier
      - /opt/dorevia-plateform/units/odoo/custom-addons:/mnt/custom-addons
      # Config Odoo
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      # Filestore
      - odoo_lab_o19_data:/var/lib/odoo
    # Exécuter oca_flatten.sh puis démarrer Odoo
    command: ["sh", "-c", "/mnt/custom-addons/bin/oca_flatten.sh && odoo -c /etc/odoo/odoo.conf"]
    # Pas de port exposé (routage via Caddy uniquement)

volumes:
  odoo_lab_o19_db:
    name: odoo_lab_o19_db
  odoo_lab_o19_data:
    name: odoo_lab_o19_data
  oca_extra_addons:
    name: oca_extra_addons

networks:
  dorevia-network:
    external: true
