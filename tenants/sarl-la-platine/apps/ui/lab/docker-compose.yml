# Docker Compose - ui lab sarl-la-platine
# Généré automatiquement depuis manifest Phase 1
# Source attendue: ui.lab.sarl-la-platine
# DB name: ui_lab_sarl-la-platine
# Compose project: dorevia_ui_lab_sarl-la-platine

services:
  linky:
    image: dorevia/linky:tresorerie-v1.2
    container_name: linky_lab_sarl-la-platine
    restart: unless-stopped
    environment:
      VAULT_URL: ${VAULT_URL:-http://vault-core-stinger:8080}
      TENANT_ID: sarl-la-platine
      TZ: ${TZ:-Europe/Paris}
      DVIG_URL: http://dvig-core-stinger:8080
      DVIG_INTERNAL_TOKEN: ${DVIG_INTERNAL_TOKEN:-0MutdWWm97SG7KAHCd3jqGL7aYZNptuqSJiGyEOIzSI}
      COMPANY_DISPLAY_NAMES: "{\"odoo:1\":\"SARL La Platine\",\"odoo:2\":\"Sweet Manihot\"}"
      DIVA_URL: ${DIVA_URL:-http://diva:8010}
    networks:
      - dorevia-network
    # Port 3000 en interne (routage via Caddy)

volumes: {}

networks:
  dorevia-network:
    external: true
