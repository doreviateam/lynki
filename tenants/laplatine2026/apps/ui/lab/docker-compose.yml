# Docker Compose - ui lab laplatine2026
# Généré automatiquement depuis manifest Phase 1
# Source attendue: ui.lab.laplatine2026
# DB name: ui_lab_laplatine2026
# Compose project: dorevia_ui_lab_laplatine2026

name: dorevia_ui_lab_laplatine2026

services:
  linky:
    # Build depuis le dépôt (lexique Web60 / T-W60-001).
    # Pour que le pied de page affiche « UI <hash> » = commit déployé : TOUJOURS
    #   make deploy   ou   ./rebuild-linky.sh
    # (sinon LINKY_UI_BUILD_REF vaut « unknown » si vous lancez docker compose build à la main).
    # Image registry : tag ci-dessous + docker push après build.
    build:
      context: ../../../../../units/dorevia-linky
      dockerfile: Dockerfile
      args:
        # Depuis ce répertoire : ./rebuild-linky.sh définit LINKY_UI_BUILD_REF automatiquement
        NEXT_PUBLIC_LINKY_UI_BUILD_REF: ${LINKY_UI_BUILD_REF:-unknown}
    image: dorevia/linky:web60-w60-001-2823917b
    container_name: linky_lab_laplatine2026
    restart: unless-stopped
    environment:
      VAULT_URL: ${VAULT_URL:-http://vault-core-stinger:8080}
      TENANT_ID: laplatine2026
      TZ: ${TZ:-Europe/Paris}
      DVIG_URL: http://dvig-core-stinger:8080
      DVIG_INTERNAL_TOKEN: ${DVIG_INTERNAL_TOKEN:-dvig_internal_core-stinger_stinger}
      LINKY_ADMIN_TOKEN: ${LINKY_ADMIN_TOKEN:-dorevia}
      LINKY_CONTROLLER_TOKEN: ${LINKY_CONTROLLER_TOKEN:-controller}
      LINKY_MANAGER_TOKEN: ${LINKY_MANAGER_TOKEN:-manager}
      COMPANY_DISPLAY_NAMES: "{\"odoo:1\":\"SARL La Platine\"}"
    networks:
      - dorevia-network
    # Port 3000 en interne (routage via Caddy)

volumes: {}

networks:
  dorevia-network:
    external: true
