# Linky — instance générique pour linky.doreviateam.com (choix du tenant)
# TENANT_ID non défini : l’app affiche l’écran de choix puis ?tenant= pour la suite.
#
# Build & déploiement : « UI <hash> » dans le pied de page suit le git du dépôt si vous utilisez
#   make deploy   ou   ./rebuild-linky-generic.sh
# (évitez docker compose build sans LINKY_UI_BUILD_REF).
# Registry : après build, docker push dorevia/linky:web60-linky-generic

name: dorevia_linky_generic

services:
  linky:
    build:
      context: ../../units/dorevia-linky
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_LINKY_UI_BUILD_REF: ${LINKY_UI_BUILD_REF:-unknown}
    image: dorevia/linky:web60-linky-generic
    container_name: linky_generic
    restart: unless-stopped
    environment:
      # Pas de TENANT_ID : mode multi-tenant, choix utilisateur sur linky.doreviateam.com
      VAULT_URL: ${VAULT_URL:-http://vault-core-stinger:8080}
      TZ: ${TZ:-Europe/Paris}
      DVIG_URL: http://dvig-core-stinger:8080
      DVIG_INTERNAL_TOKEN: ${DVIG_INTERNAL_TOKEN:-dvig_internal_core-stinger_stinger}
      LINKY_ADMIN_TOKEN: ${LINKY_ADMIN_TOKEN:-dorevia}
      LINKY_CONTROLLER_TOKEN: ${LINKY_CONTROLLER_TOKEN:-controller}
      LINKY_MANAGER_TOKEN: ${LINKY_MANAGER_TOKEN:-manager}
      # Libellés société par tenant (affichés dans le sélecteur)
      COMPANY_DISPLAY_NAMES: '{"laplatine2026":{"odoo:1":"SARL La Platine"},"o19":{"odoo:1":"Ma Société"}}'
    networks:
      - dorevia-network

networks:
  dorevia-network:
    external: true
