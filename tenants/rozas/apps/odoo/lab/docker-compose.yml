# Docker Compose - Odoo odoo lab rozas
# Template généré automatiquement par dorevia.sh
# Source attendue: odoo.lab.rozas
# DB name: odoo_lab_rozas
# Compose project: dorevia_odoo_lab_rozas

services:
  db:
    image: postgres:16
    container_name: odoo_db_lab_rozas
    restart: unless-stopped
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo_lab_rozas_db:/var/lib/postgresql/data
    networks:
      - dorevia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:18.0  # ⚠️ Version taggée (pas latest)
    container_name: odoo_lab_rozas
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dorevia-network
    volumes:
      # Sources OCA (read-only)
      - /opt/dorevia-plateform/sources/oca:/mnt/oca:ro
      # Extra-addons flatten (symlinks)
      - oca_extra_addons:/mnt/extra-addons
      # Addons métier
      - /opt/dorevia-plateform/units/odoo/custom-addons:/mnt/custom-addons
      # Config Odoo
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      # Filestore
      - odoo_lab_rozas_data:/var/lib/odoo
    command: ["sh", "-c", "/mnt/custom-addons/bin/oca_flatten.sh && odoo -c /etc/odoo/odoo.conf"]
    # Pas de port exposé (routage via Caddy uniquement)

volumes:
  odoo_lab_rozas_db:
    name: odoo_lab_rozas_db
  odoo_lab_rozas_data:
    name: odoo_lab_rozas_data
  oca_extra_addons:
    external: true
    name: oca_extra_addons

networks:
  dorevia-network:
    external: true

