# Caddy — Odoo 19 prod Doreviateam
# À inclure dans la Caddyfile du serveur (ex. 85.215.206.213).
# Caddy et les conteneurs doivent partager le réseau dorevia-network.
# /longpolling → port 8072 (temps réel : Discuss, notifications)

odoo.doreviateam.com {
  handle /longpolling* {
    reverse_proxy odoo_prod_o19:8072 {
      header_up X-Forwarded-Proto {scheme}
      header_up X-Forwarded-For {remote_host}
    }
  }
  handle {
    reverse_proxy odoo_prod_o19:8069 {
      header_up X-Forwarded-Proto {scheme}
      header_up X-Forwarded-For {remote_host}
    }
  }
}
