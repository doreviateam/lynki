# Docker Compose — Odoo 19 production Doreviateam
# Spec: ZeDocs/web42/odoo-doreviateam.md
# Base: doreviateam | URL: https://odoo.doreviateam.com
# Phase 1 : pas de Vault/DVIG

name: odoo-prod-doreviateam

services:
  db:
    image: postgres:16
    container_name: odoo_db_prod_o19
    restart: unless-stopped
    environment:
      POSTGRES_DB: doreviateam
      POSTGRES_USER: dorevia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - odoo_prod_o19_db:/var/lib/postgresql/data
    networks:
      - dorevia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dorevia"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Optionnel : limiter blocages (Odoo ouvre beaucoup de connexions)
    # command: ["postgres", "-c", "max_connections=100", "-c", "shared_buffers=256MB"]

  odoo:
    image: odoo:19.0
    container_name: odoo_prod_o19
    init: true
    tty: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: dorevia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_PASSWD: ${ADMIN_PASSWD}
    ports:
      # Temporaire pour install/debug ; retirer en prod finale (Phase 5)
      - "38069:8069"
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - dorevia-network
    volumes:
      - /opt/dorevia-plateform/sources/oca:/mnt/oca:ro
      - /opt/dorevia-plateform/units/odoo/addons-o19:/mnt/addons-o19:ro
      - oca_extra_addons_prod:/mnt/extra-addons
      - /opt/dorevia-plateform/units/odoo/custom-addons:/mnt/custom-addons
      - ./odoo.prod-o19.conf.template:/etc/odoo/odoo.conf.template:ro
      - ./run_odoo.sh:/mnt/run/run_odoo.sh:ro
      - odoo_prod_o19_data:/var/lib/odoo
    command: ["sh", "/mnt/run/run_odoo.sh"]

volumes:
  odoo_prod_o19_db:
    name: odoo_prod_o19_db
  odoo_prod_o19_data:
    name: odoo_prod_o19_data
  oca_extra_addons_prod:
    name: oca_extra_addons_prod

networks:
  dorevia-network:
    external: true
