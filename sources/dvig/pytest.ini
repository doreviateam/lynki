[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: Tests unitaires
    integration: Tests d'intégration
    e2e: Tests end-to-end
    slow: Tests lents (concurrence, e2e)
    contract: Tests contractuels d'API (ping, contrats d'erreur)
    negative: Tests négatifs (sécurité, schémas invalides)
    ops: Tests opérabilité (backup/restore, migrations)

