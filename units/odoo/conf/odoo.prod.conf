[options]
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; IMPORTANT: garder les addons core + ajouter OCA
; addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons,/mnt/custom-addons

data_dir = /var/lib/odoo

; queue_job : workers pour exécution des jobs (vaulting immédiat)
workers = 2
server_wide_modules = web,queue_job

# Reverse proxy (Caddy)
proxy_mode = True

[queue_job]
channels = root:2,dorevia_vault:2
