# Configuration Odoo pour exécution des tests (dorevia_session_guard)
# Inclut web_session_auto_close depuis sources/oca/web/

[options]
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
dbfilter = ^odoo_test$

; Addons: core + OCA web (web_session_auto_close) + custom
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons/web,/mnt/custom-addons

data_dir = /var/lib/odoo

workers = 0
server_wide_modules = web

proxy_mode = True
