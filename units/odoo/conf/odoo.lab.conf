[options]
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
dbfilter = ^dorevia_p0$

; IMPORTANT: garder les addons core + ajouter OCA + custom-addons
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons,/mnt/custom-addons

data_dir = /var/lib/odoo

; Lab DoD P0 : pas de queue_job (évite DuplicateSectionError lors création DB)
; Replay adapter = endpoints HTTP synchrones, pas besoin de queue_job
workers = 1
server_wide_modules = web

# Reverse proxy (Caddy)
proxy_mode = True
