services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - db_data:/var/lib/postgresql/data

  odoo:
    image: odoo:18.0-20250819
    depends_on:
      - db
    ports:
      - "18069:8069"
    volumes:
      - ./custom-addons:/mnt/custom-addons
      - ./conf/odoo.lab.conf:/etc/odoo/odoo.conf:ro
      - ../../sources/oca:/mnt/extra-addons:ro
      - odoo_data:/var/lib/odoo
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]

volumes:
  db_data:
  odoo_data:

