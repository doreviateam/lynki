<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" style="background: transparent;">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Odoo -->
  <g id="odoo">
    <rect x="50" y="50" width="150" height="100" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="125" y="95" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700">Odoo</text>
    <text x="125" y="115" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="14">ERP</text>
  </g>
  
  <!-- Flčche 1 -->
  <path d="M 220 100 L 280 100" stroke="url(#grad1)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- DVIG -->
  <g id="dvig">
    <rect x="300" y="50" width="150" height="100" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="375" y="95" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700">DVIG</text>
    <text x="375" y="115" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="14">Collecte</text>
  </g>
  
  <!-- Flčche 2 -->
  <path d="M 470 100 L 530 100" stroke="url(#grad1)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Vault -->
  <g id="vault">
    <rect x="550" y="50" width="150" height="100" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="625" y="95" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700">Vault</text>
    <text x="625" y="115" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="14">Preuve</text>
  </g>
  
  <!-- Marqueur de flčche -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="url(#grad1)" />
    </marker>
  </defs>
  
  <!-- Légende en bas -->
  <text x="400" y="180" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">
    Événements financiers ’ Collecte automatique ’ Preuves horodatées
  </text>
</svg>
