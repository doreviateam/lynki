<!-- SVG #2 : Illustration Processus  Capture / Scellage / Bloc -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <!-- Etape 1 : Flux ERP -->
  <g transform="translate(50, 50)">
    <path d="M 0 50 Q 50 0 100 50 T 200 50" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="2 4" opacity="0.4"/>
    <circle cx="100" cy="50" r="20" fill="rgba(255,255,255,0.03)" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="100" y="100" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="10" font-weight="600" text-transform="uppercase">Flux ERP</text>
  </g>

  <!-- Flčche de liaison -->
  <path d="M 220 100 L 260 100" stroke="rgba(255,255,255,0.1)" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Etape 2 : Scellage -->
  <g transform="translate(280, 50)">
    <circle cx="20" cy="50" r="30" fill="rgba(91, 124, 250, 0.05)" stroke="#5B7CFA" stroke-width="1"/>
    <!-- Symbole Verrou Abstrait -->
    <path d="M 10 55 L 30 55 M 20 45 L 20 65" stroke="#5B7CFA" stroke-width="2"/>
    <path d="M 10 45 Q 20 30 30 45" stroke="#5B7CFA" stroke-width="1.5" fill="none"/>
    <text x="20" y="100" text-anchor="middle" fill="#5B7CFA" font-family="sans-serif" font-size="10" font-weight="700" text-transform="uppercase">Scellage</text>
  </g>

  <!-- Flčche de liaison -->
  <path d="M 380 100 L 420 100" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Etape 3 : Bloc Preuve -->
  <g transform="translate(480, 50)">
    <rect width="40" height="40" x="0" y="30" rx="4" fill="#5B7CFA" opacity="0.9"/>
    <text x="20" y="100" text-anchor="middle" fill="#E5E7EB" font-family="sans-serif" font-size="10" font-weight="700" text-transform="uppercase">Preuve</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgba(255,255,255,0.1)" />
    </marker>
  </defs>
</svg>
