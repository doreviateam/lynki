<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect x="80" y="60" width="240" height="280" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  
  <!-- Digital Screen -->
  <rect x="110" y="100" width="180" height="80" rx="8" fill="#0F172A" stroke="#5B7CFA" stroke-width="1"/>
  <text x="200" y="140" text-anchor="middle" fill="#5B7CFA" font-family="monospace" font-size="14" font-weight="700">SCELLEMENT ACTIF</text>
  <text x="200" y="160" text-anchor="middle" fill="#5B7CFA" font-family="monospace" font-size="9" opacity="0.6">IUUP ENGINE v2.0</text>
  
  <!-- Status Lines -->
  <g transform="translate(110, 210)">
    <rect width="180" height="32" rx="4" fill="#fff" stroke="#E2E8F0"/>
    <circle cx="16" cy="16" r="3" fill="#5B7CFA"/>
    <text x="32" y="20" fill="#475569" font-family="sans-serif" font-size="11" font-weight="500">Capture Source</text>
  </g>

  <g transform="translate(110, 250)">
    <rect width="180" height="32" rx="4" fill="#fff" stroke="#E2E8F0"/>
    <circle cx="16" cy="16" r="3" fill="#5B7CFA"/>
    <text x="32" y="20" fill="#475569" font-family="sans-serif" font-size="11" font-weight="500">Integrite Certifiee</text>
  </g>

  <!-- Seal -->
  <circle cx="280" cy="300" r="20" fill="#5B7CFA"/>
  <text x="280" y="305" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12" font-weight="800">DV</text>
</svg>
