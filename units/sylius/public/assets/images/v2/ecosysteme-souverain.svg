<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <filter id="infraGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- France Dot Map Silhouette -->
  <path d="M 200 40 L 280 100 L 310 200 L 260 340 L 140 340 L 90 200 L 120 100 Z" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="4 4"/>
  
  <!-- Nodes -->
  <circle cx="200" cy="180" r="60" fill="rgba(16,185,129,0.03)" stroke="rgba(16,185,129,0.1)" stroke-width="1"/>
  
  <!-- Sovereign Shield -->
  <g transform="translate(170, 150)">
    <path d="M 0 0 L 60 0 L 60 60 C 60 90 30 100 30 100 C 30 100 0 90 0 60 Z" fill="#050a15" stroke="#10b981" stroke-width="2" filter="url(#infraGlow)"/>
    <text x="30" y="45" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="900" letter-spacing="1">FRANCE</text>
    <rect x="15" y="55" width="30" height="3" fill="#3b82f6"/>
    <rect x="15" y="58" width="30" height="3" fill="#ffffff"/>
    <rect x="15" y="61" width="30" height="3" fill="#ef4444"/>
  </g>

  <!-- Data Stream Lines -->
  <path d="M 100 100 Q 150 150 170 180" stroke="rgba(16,185,129,0.2)" stroke-width="1" fill="none"/>
  <path d="M 300 100 Q 250 150 230 180" stroke="rgba(16,185,129,0.2)" stroke-width="1" fill="none"/>
  <path d="M 200 300 L 200 250" stroke="rgba(16,185,129,0.2)" stroke-width="1" fill="none"/>

  <!-- AI Node DIVA -->
  <circle cx="320" cy="120" r="25" fill="#0a1220" stroke="#10b981" stroke-width="1"/>
  <text x="320" y="125" text-anchor="middle" fill="#10b981" font-family="sans-serif" font-size="10" font-weight="900" filter="url(#infraGlow)">DIVA</text>
</svg>
