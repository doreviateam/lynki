<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Window -->
  <rect x="20" y="20" width="360" height="260" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  
  <!-- Bar -->
  <path d="M 20 55 L 380 55" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="45" cy="38" r="3" fill="#E2E8F0"/>
  <circle cx="60" cy="38" r="3" fill="#E2E8F0"/>
  <circle cx="75" cy="38" r="3" fill="#E2E8F0"/>

  <!-- Lines -->
  <g transform="translate(45, 85)">
    <rect width="310" height="10" rx="2" fill="#F1F5F9"/>
    <rect y="25" width="260" height="10" rx="2" fill="#F1F5F9"/>
    <rect y="50" width="280" height="10" rx="2" fill="#F1F5F9"/>
  </g>

  <!-- Badges -->
  <g transform="translate(45, 200)">
    <rect width="80" height="32" rx="4" fill="rgba(91, 124, 250, 0.1)" stroke="#5B7CFA" stroke-width="1"/>
    <text x="40" y="20" text-anchor="middle" fill="#5B7CFA" font-family="monospace" font-size="9" font-weight="700">VERIFIE</text>
  </g>
</svg>
